[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true

[functions]
  directory = "dist/server"
  node_bundler = "none"

[[functions]]
  name = "server"
  included_files = ["dist/server/**"]
